/* 1. ENTRANCE & JUMP PHYSICS */
@keyframes ashUltimateEntrance {
    0% { 
        transform: translateX(-300%) rotate(-180deg); 
        opacity: 0; 
    }
    30% { 
        transform: translateX(0) rotate(0deg); 
        opacity: 1;
    }
    45% { 
        transform: translateY(-65px) rotateX(180deg) scale(1.15); 
        box-shadow: 0 55px 45px rgba(0,0,0,0.4);
    }
    65% { 
        transform: translateY(0) rotateX(360deg) scaleX(1.3) scaleY(0.7);
        box-shadow: 0 2px 5px rgba(0,0,0,0.6);
    }
    85% {
        transform: translateY(-8px) scale(1.05);
    }
    100% { 
        transform: translateY(0) scale(1);
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
}

/* 2. STEADY PROFESSIONAL GLOW (No Snake Motion) */
@keyframes professionalGlow {
    0%, 100% { 
        opacity: 0.8; 
        transform: scale(1);
        filter: blur(1px);
    }
    50% { 
        opacity: 1; 
        transform: scale(1.05);
        filter: blur(2px);
        box-shadow: 0 0 25px #ffff00, inset 0 0 15px #ffff00;
    }
}

// Gallery Upload Function
function uploadAppLogo(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const max = 300; 
                canvas.width = max; canvas.height = max;
                const ctx = canvas.getContext('2d');
                // Circular Crop logic for Canvas
                ctx.beginPath();
                ctx.arc(max/2, max/2, max/2, 0, Math.PI*2);
                ctx.clip();
                ctx.drawImage(img, 0, 0, max, max);
                
                const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
                localStorage.setItem('ASH_CUSTOM_LOGO', dataUrl);
                showLogo(dataUrl);
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
    }
}

    el.sortableInstance = Sortable.create(el, {

            if(exists) {
                showToast(`'${finalName}' Already Exists!`, true);
                
                // --- YEHA BADLAV HAI ---
                // Pop-up ko khula rakhne ke liye hum function ko phir se call karenge
                setTimeout(() => editCategory(i), 100); 
                return; 
            }

            // 3. Save Logic
            recipes.forEach(r => { if (r.category === oldName) r.category = finalName; });
            cats[i] = finalName; 
            saveData(); 
            renderCatFilters(); 
            renderRecipes();
            showToast("Category Updated!");
        }
    });
}

function submitInputModal() {

    let priceInput = document.getElementById('inp2').value.trim();

    // 1. Name Validation

        if (priceInput === "" || isNaN(priceInput)) {
            showToast("Please enter a valid price!", true);
            return;
        }

        // 3. Quantity (Base) Validation - NEW
        // Agar quantity khali hai ya 0 se kam hai
        if (baseInput === "" || isNaN(baseInput) || parseFloat(baseInput) <= 0) {
            showToast("Please enter a valid quantity!", true);
            return;
        }

        let isDuplicate = stock.some((item, index) => item.name.toLowerCase() === name.toLowerCase() && index !== activeIdx);

            base: parseFloat(baseInput) || 1,

        if (!cat || cat === "" || cat === "No Category") {
            showToast("Please select a Category first!", true);
            return;

            showToast("Recipe name already exists!", true);
            return;
        }

            name: name,
            category: cat,
            img: tempImg,
            items: (activeIdx !== null) ? (recipes[activeIdx].items || []) : [],
            packaging: (activeIdx !== null) ? (recipes[activeIdx].packaging || 0) : 0,

            marginPct: (activeIdx !== null) ? (recipes[activeIdx].marginPct || 0) : 0

        function upd(i, k, v) { 
    let recipe = recipes[activeIdx];
    recipe.items[i][k] = (k === 'name') ? v : parseFloat(v) || 0; 

    // Sirf us row ki COST ko update karein (taaki keyboard na band ho)
    let item = recipe.items[i];
    let rowCost = (item.price / item.total) * item.used || 0;
    
    // Row ke cost display ko live update karna
    let rows = document.querySelectorAll('#ingredientList .row-item');
    if(rows[i]) {
        rows[i].querySelector('b').innerText = rowCost.toFixed(3);
    }

    // Neeche ka Grand Total update karein
    calcTotal(); 
}
function calcTotal() {
    let r = recipes[activeIdx];
    let recipeT = 0;
    
    (r.items || []).forEach(it => {
        // Stock material se latest base dhundna
        let stockItem = stock.find(s => s.name === it.name);
        
        // CHANGE: Fallback changed from 1000 to 1
        let currentBase = (stockItem && stockItem.base) ? stockItem.base : (it.total || 1);
        
        recipeT += (it.price / currentBase) * it.used || 0;
    });
    
    let pack = parseFloat(document.getElementById('packInp').value) || 0;
    let effP = parseFloat(document.getElementById('effInp').value) || 0;
    let sellP = parseFloat(document.getElementById('sellInp').value) || 0;
    
    let effortVal = (recipeT + pack) * (effP / 100);
    let subTotal = recipeT + pack + effortVal;
    let final = sellP > 0 ? (subTotal / (sellP / 100)) : subTotal;

    document.getElementById('recipeTotalDisplay').innerText = recipeT.toFixed(3);
    document.getElementById('allTotalDisplay').innerText = subTotal.toFixed(3);
    document.getElementById('grandTotal').innerText = final.toFixed(3) + " OMR";
    
    r.packaging = pack; r.effortPct = effP; r.marginPct = sellP;
}

        // CHANGE: Default base changed from 1000 to 1
        let b = f.base || 1; 
        
        return `

                 onclick="addIng('${f.name}', ${f.price}, ${b})">

                </span>

}

    // b wo gram hai jo aapne stock mein save kiya (e.g. 500)

function uploadAppLogo(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const max = 200; 
                let w = img.width, h = img.height;
                if (w > h) { if (w > max) { h *= max/w; w = max; } }
                else { if (h > max) { w *= max/h; h = max; } }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                localStorage.setItem('ASH_CUSTOM_LOGO', dataUrl);
                showLogo(dataUrl);
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
    }
}

// --- OPTION 2: DOWNLOAD AS JSON FILE (APK Compatible Version) ---
function downloadJSONFile() {
    let selected = { s: [], r: [], c: [] }; 
    let chks = document.querySelectorAll('.share-chk');
    let catsNeeded = new Set();
    
    chks.forEach(c => {
        if(c.ed) {
            let idx = parseInt(c.getAttribute('data-idx'));
            let type = c.getAttribute('data-type');
            if(type === 'stock') {
                selected.s.push({...stock[idx], img: ""});
            } else if(type === 'recipe') {
                let rec = recipes[idx];
                selected.r.push({...rec, img: ""});
                if(rec.category) catsNeeded.add(rec.category);
            }
        }
    });

    catsNeeded.forEach(cn => { 
        if(cats.includes(cn)) selected.c.push(cn); 
    });

    if(selected.s.length === 0 && selected.r.length === 0) {
        return showToast("First, select Items or Recipes!", true);
    }

    // JSON String taiyar karein
    const dataStr = JSON.stringify(selected, null, 2);
    
    // APK COMPATIBILITY FIX: 
    // Blob ki jagah hum Data URI aur Base64 use kar rahe hain jo APK mein better chalta hai
    try {
        const fileName = "AshBakes_Backup_" + new Date().toISOString().slice(0,10) + ".json";
        const base64Data = btoa(unescape(encodeURIComponent(dataStr)));
        const dataUri = 'data:application/json;charset=utf-8;base64,' + base64Data;

        const link = document.createElement('a');
        link.href = dataUri;
        link.download = fileName;
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        showToast("JSON File Downloaded! ✅");
    } catch (err) {
        console.error("Download Error:", err);
        showToast("Download failed. Use 'GENERATE CODE' instead.", true);
    }
}

// --- OPTION 2: IMPORT FROM JSON FILE ---
function importJSONFile(input) {
    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        const content = e.target.result;
        // Pura content textarea mein daal kar purana logic reuse karein
        document.getElementById('shareRestoreInput').value = content;
        processSmartAdd(); // Direct add function call
        input.value = ""; // Input clear
    };
    reader.readAsText(file);
}

function updateButtonUI() {
    const stockChks = document.querySelectorAll('.share-chk[data-type="stock"]');
    const recipeChks = document.querySelectorAll('.share-chk[data-type="recipe"]');
    const allChks = document.querySelectorAll('.share-chk');
    
    const stockAll = stockChks.length > 0 && Array.from(stockChks).every(c => c.checked);
    const recipeAll = recipeChks.length > 0 && Array.from(recipeChks).every(c => c.checked);
    const everything = allChks.length > 0 && Array.from(allChks).every(c => c.checked);
    
    const btnStock = document.getElementById('btn-stock');
    const btnRecipe = document.getElementById('btn-recipe');
    const btnAll = document.getElementById('btn-all');

    // Toggle Blue Border class
    if(btnStock) btnStock.classList.toggle('share-btn-active', stockAll);
    if(btnRecipe) btnRecipe.classList.toggle('share-btn-active', recipeAll);
    
    if(btnAll) {
        btnAll.innerText = everything ? "DESELECT ALL" : "SELECT ALL";
        btnAll.classList.toggle('share-btn-active', everything);
    }
}

function bulkSelect(type) {
    let chks = document.querySelectorAll(`.share-chk[data-type="${type}"]`);
    if(chks.length === 0) return;
    let isAllChecked = Array.from(chks).every(c => c.checked);
    chks.forEach(c => c.checked = !isAllChecked);
    updateButtonUI();
}

function toggleAllShare() {
    let chks = document.querySelectorAll('.share-chk');
    if(chks.length === 0) return;
    let isAllChecked = Array.from(chks).every(c => c.checked);
    chks.forEach(c => c.checked = !isAllChecked);
    updateButtonUI();
}

function generateShareCode() {
    let selected = { s: [], r: [], c: [] }; 
    let chks = document.querySelectorAll('.share-chk');
    let catsNeeded = new Set();

    chks.forEach(c => {
        if(c.checked) {
            let idx = parseInt(c.getAttribute('data-idx'));
            let type = c.getAttribute('data-type');
            if(type === 'stock') {
                selected.s.push({ name: stock[idx].name, price: stock[idx].price || 0, img: "" });
            } else if(type === 'recipe') {
                let rec = recipes[idx];
                selected.r.push({...rec, img: ""});
                if(rec.category) catsNeeded.add(rec.category);
            }
        }
    });

    catsNeeded.forEach(cn => { if(cats.includes(cn)) selected.c.push(cn); });

    if(selected.s.length === 0 && selected.r.length === 0) {
        document.getElementById('shareCodeOutput').value = "";
        return showToast("First, select Item, Recipe or All", true);
    }

    // Direct JSON output as you requested
    document.getElementById('shareCodeOutput').value = JSON.stringify(selected);
    showToast("JSON Text Generated! Copy now.");
}

function copyShareCode() {
    const output = document.getElementById('shareCodeOutput');
    const val = output.value.trim();
    if(!val) return showToast("First click on 'GENERATE CODE'!", true);
    output.select();
    output.setSelectionRange(0, 99999); 
    document.execCommand('copy');
    showToast("JSON Text copied to clipboard!");
}

function processSmartAdd() {
    try {
        const inputArea = document.getElementById('shareRestoreInput');
        let rawCode = inputArea.value.trim();
        if(!rawCode) return showToast("Paste JSON text or select file!", true);
        
        let decoded = JSON.parse(rawCode);
        let addedLog = [];
        
        if(decoded.s) decoded.s.forEach(item => {
            if(!stock.some(s => s.name.toLowerCase() === item.name.toLowerCase())) { stock.push(item); addedLog.push("📦 Item: " + item.name); }
        });
        if(decoded.r) decoded.r.forEach(rec => {
            if(!recipes.some(r => r.name.toLowerCase() === rec.name.toLowerCase())) { recipes.push(rec); addedLog.push("📖 Recipe: " + rec.name); }
        });
        if(decoded.c) decoded.c.forEach(newCat => {
            if(!cats.includes(newCat)) { cats.push(newCat); addedLog.push("📁 Category: " + newCat); }
        });

        if(addedLog.length > 0) {
            saveData();
            if(typeof initApp === "function") initApp(); 
            showImportSummary(addedLog);
            inputArea.value = ""; 
        } else { showToast("All items already exist!", true); }
    } catch(err) { showToast("Invalid Format!", true); }
}



function processReset() {
    showCustomModal({
        title: "⚠️ FULL RESET?",
        msg: "Delete ALL Recipes, Stock, and Categories?",
        onYes: () => {
            localStorage.removeItem('ASH_R'); localStorage.removeItem('ASH_S'); localStorage.removeItem('ASH_C');
            recipes = [];
            stock = [{ name: "", price: 0, img: "" }
            ];
            cats = [""
            ];
            saveData();
            initApp();
            openSmartShare();
            showToast("App Reset!");
        }
    });
}

function showImportSummary(log) {
    let listHTML = log.map(msg => `<div style="padding:5px; border-bottom:1px solid #eee;">${msg}</div>`).join('');
    let popup = `
        <div id="finalPopup" style="position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:999999; display:flex; align-items:center; justify-content:center; padding:20px; backdrop-filter:blur(5px);">
            <div style="background:white; border-radius:20px; width:100%; max-width:320px; padding:20px; text-align:center;">
                <h3 style="color:#00D2D3; margin:0;">Success!</h3>
                <div style="max-height:150px; overflow-y:auto; font-size:12px; margin:15px 0; text-align:left;">${listHTML}</div>
                <button onclick="document.getElementById('finalPopup').remove()" style="width:100%; padding:12px; background:#00D2D3; color:white; border:none; border-radius:10px; font-weight:bold;">OKAY</button>
            </div>
        </div>`;
    document.body.insertAdjacentHTML('beforeend', popup);
}

window.onpopstate = function(event) {
    // 1.  karein ki kya koi Panel ya Overlay khula hai?
    const sharePanel = document.getElementById('sharePanel');
    const overlays = document.querySelectorAll('.modal-overlay, .panel, .image-cropper-container');
    
    let panelWasOpen = false;

    // Agar Share Panel khula hai to band karo
    if (sharePanel && sharePanel.style.display !== 'none') {
        sharePanel.style.display = 'none';
        panelWasOpen = true;
    }

    // Baaki kisi bhi modal ya panel ko band karo
    overlays.forEach(el => {
        if (el.style.display !== 'none' && el.style.display !== '') {
            el.style.display = 'none';
            panelWasOpen = true;
        }
    });

    if (panelWasOpen) {
        // Agar humne koi panel band kiya hai, to wapas pushState karein 
        // taaki agla back press phir se handle ho sake (app close na ho)
        window.history.pushState({ page: 'main' }, 'Main', window.location.pathname);
    } else {
        // 2. Agar koi panel nahi khula tha, to Home Screen dikhao
        // Agar aapke app mein showSection function hai:
        if (typeof showSection === 'function') {
            showSection('home'); 
        }
        
        // Wapas state push karein taaki user Home par hi rahe aur exit na ho
        window.history.pushState({ page: 'main' }, 'Main', window.location.pathname);
        
        // Optional: User ko feedback dene ke liye
        // toast("Press back again to exit"); 
    }
};
